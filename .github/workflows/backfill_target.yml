name: 🚀 특정 계정 초고속 백필 (소재 포함 / 병렬 처리)

on:
  workflow_dispatch:

jobs:
  run-target-backfill:
    runs-on: ubuntu-latest
    
    strategy:
      # ✨ 6대의 깃허브 서버가 아래 6개 구간을 동시에 긁어옵니다! (속도 6배 증가)
      max-parallel: 6 
      fail-fast: false
      matrix:
        period:
          - {start: "2026-01-01", end: "2026-01-12"}
          - {start: "2026-01-13", end: "2026-01-24"}
          - {start: "2026-01-25", end: "2026-02-05"}
          - {start: "2026-02-06", end: "2026-02-17"}
          - {start: "2026-02-18", end: "2026-02-28"}
          - {start: "2026-03-01", end: "2026-03-10"}

    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
      # 🎯 타겟 계정 설정
      TARGET_CUSTOMER_ID: "406051"
      START_DATE: ${{ matrix.period.start }}
      END_DATE: ${{ matrix.period.end }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv sqlalchemy psycopg2-binary pandas openpyxl

      - name: Run Fast Backfill Loop
        shell: python
        run: |
          import subprocess
          import os
          from datetime import datetime, timedelta

          start_str = os.getenv("START_DATE")
          end_str = os.getenv("END_DATE")
          target_id = os.getenv("TARGET_CUSTOMER_ID")
          
          print(f"📌 작업 구간: {start_str} ~ {end_str}")
          print(f"📌 대상 계정: {target_id}")

          start_date = datetime.strptime(start_str, "%Y-%m-%d").date()
          end_date = datetime.strptime(end_str, "%Y-%m-%d").date()

          current = start_date
          while current <= end_date:
              d_str = current.strftime("%Y-%m-%d")
              
              try:
                  # --skip_dim을 쓰지 않아 소재까지 긁어오지만, 병렬 처리라 훨씬 빠릅니다.
                  cmd = [
                      "python", "collector.py", 
                      "--date", d_str, 
                      "--customer_id", target_id
                  ]
                  subprocess.run(cmd, check=True)
              except subprocess.CalledProcessError:
                  print(f"❌ 실패: {d_str}")
                  
              current += timedelta(days=1)
