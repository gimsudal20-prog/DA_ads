name: Live Budget Tracker (30분 간격 감시)

on:
  schedule:
    # 한국 시간 기준 오전 9시 ~ 밤 11시 50분 사이, 매 30분마다 감시망 가동
    # (UTC 기준 0시 ~ 14시에 해당)
    - cron: '*/30 0-14 * * *'
  workflow_dispatch: # 수동 테스트 버튼

jobs:
  track-budget:
    runs-on: ubuntu-latest
    
    env:
      TZ: Asia/Seoul # 한국 시간으로 고정
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv sqlalchemy psycopg2-binary pandas openpyxl

      - name: Run Collector for TODAY (실시간 꺼짐 감지)
        run: |
          TODAY=$(date +'%Y-%m-%d')
          echo "🕵️ $TODAY 당일 캠페인 예산 소진 상태를 실시간으로 추적합니다..."
          # --skip_dim 옵션을 써서 무거운 작업은 빼고, '꺼짐 상태'만 초고속으로 싹 긁어옵니다.
          python collector.py --date $TODAY --skip_dim --workers 10
