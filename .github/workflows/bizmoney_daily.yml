name: 비즈머니 잔액 일일 수집
run-name: 비즈머니 잔액 디버그 수집

on:
  workflow_dispatch: {}

jobs:
  run-bizmoney:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
      ACCOUNT_MASTER_FILE: account_master.xlsx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Check repo files
        run: |
          echo "pwd=$(pwd)"
          ls -lah
          echo "ACCOUNT_MASTER_FILE=${ACCOUNT_MASTER_FILE}"
          if [ -f "${ACCOUNT_MASTER_FILE}" ]; then
            echo "account master exists"
          else
            echo "account master missing"
            exit 1
          fi
          if [ -f "account_master.py" ]; then
            echo "account_master.py exists"
          else
            echo "account_master.py missing"
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests python-dotenv sqlalchemy psycopg2-binary pandas openpyxl

      - name: Run BizMoney Collector (debug)
        run: |
          python collect_bizmoney.py
