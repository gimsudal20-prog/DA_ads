name: Super Fast Backfill (10 Days Chunk)

on:
  workflow_dispatch:

jobs:
  run-backfill:
    runs-on: ubuntu-latest
    
    strategy:
      # ✨ [핵심 최적화 1] 1개씩 순서대로 하던 작업을 4개 덩어리 동시 실행으로 변경!
      max-parallel: 4 
      fail-fast: false
      matrix:
        period:
          - {start: "2026-01-01", end: "2026-01-10"}
          - {start: "2026-01-11", end: "2026-01-20"}
          - {start: "2026-01-21", end: "2026-01-31"}
          - {start: "2026-02-01", end: "2026-02-10"}
          - {start: "2026-02-11", end: "2026-02-20"}
          - {start: "2026-02-21", end: "2026-02-28"}
          - {start: "2026-03-01", end: "2026-03-10"}

  
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
      START_DATE: ${{ matrix.period.start }}
      END_DATE: ${{ matrix.period.end }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv sqlalchemy psycopg2-binary pandas openpyxl

      - name: Run Express Backfill Loop
        shell: python
        run: |
          import subprocess
          import time
          import os
          from datetime import datetime, timedelta

          start_str = os.getenv("START_DATE")
          end_str = os.getenv("END_DATE")
          
          print(f"📌 작업 구간: {start_str} ~ {end_str}")

          start_date = datetime.strptime(start_str, "%Y-%m-%d").date()
          end_date = datetime.strptime(end_str, "%Y-%m-%d").date()

          current = start_date
          while current <= end_date:
              d_str = current.strftime("%Y-%m-%d")
              
              try:
                  # ✨ [핵심 최적화 2] 워커를 5로 줄여서 네이버 API 차단을 피하고 안정적으로 스무스하게 수집
                  subprocess.run(["python", "collector.py", "--date", d_str, "--skip_dim", "--workers", "5"], check=True)
              except subprocess.CalledProcessError:
                  print(f"❌ 실패: {d_str}")
              
              current += timedelta(days=1)
              time.sleep(3) 

          print(f"✅ {start_str} ~ {end_str} 구간 쾌속 수집 완료!")
