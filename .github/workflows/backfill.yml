name: 🔄 과거 데이터 수집 (Backfill)

# 깃허브 웹사이트에서 수동으로 버튼을 눌러 실행할 수 있게 설정
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '시작일 (YYYY-MM-DD)'
        required: true
        default: '2026-01-01'
      end_date:
        description: '종료일 (YYYY-MM-DD)'
        required: true
        default: '2026-03-10'
      customer_id:
        description: '수집할 계정 커스텀 ID'
        required: true
        default: '406051'

jobs:
  run-backfill:
    runs-on: ubuntu-latest
    
    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 사용하시는 버전에 맞게 수정
        cache: 'pip'

    - name: 필요 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 백필 스크립트 실행
      env:
        # 깃허브 Secrets에 등록된 환경변수를 가져옵니다
        NAVER_API_KEY: ${{ secrets.NAVER_API_KEY }}
        NAVER_API_SECRET: ${{ secrets.NAVER_API_SECRET }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python backfill.py ${{ github.event.inputs.start_date }} ${{ github.event.inputs.end_date }} ${{ github.event.inputs.customer_id }}
