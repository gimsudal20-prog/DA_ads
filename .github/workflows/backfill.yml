name: Backfill Ads Data

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '시작일 (YYYY-MM-DD)'
        required: true
        default: '2024-01-01'
      end_date:
        description: '종료일 (YYYY-MM-DD)'
        required: true
        default: '2024-03-10'
      max_workers:
        description: '병렬 워커 수 (속도 조절용)'
        required: true
        default: '8'

jobs:
  run-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Backfill Script
        env:
          NAVER_API_KEY: ${{ secrets.NAVER_API_KEY }}
          NAVER_API_SECRET: ${{ secrets.NAVER_API_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🚀 백필 작업을 시작합니다: ${{ github.event.inputs.start_date }} ~ ${{ github.event.inputs.end_date }}"
          python backfill.py --start "${{ github.event.inputs.start_date }}" --end "${{ github.event.inputs.end_date }}" --max_workers "${{ github.event.inputs.max_workers }}"
