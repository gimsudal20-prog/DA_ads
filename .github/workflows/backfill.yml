name: Super Fast Backfill (Jan 1 ~ Mar 10)

on:
  workflow_dispatch:

jobs:
  run-backfill:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
      START_DATE: "2026-01-01"
      END_DATE: "2026-03-10"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv sqlalchemy psycopg2-binary pandas openpyxl

      - name: Run Express Backfill Loop
        shell: python
        run: |
          import subprocess
          import time
          import os
          from datetime import datetime, timedelta

          start_str = os.getenv("START_DATE")
          end_str = os.getenv("END_DATE")

          print(f"📌 작업 구간: {start_str} ~ {end_str}")

          start_date = datetime.strptime(start_str, "%Y-%m-%d").date()
          end_date = datetime.strptime(end_str, "%Y-%m-%d").date()

          current = start_date
          while current <= end_date:
              d_str = current.strftime("%Y-%m-%d")

              try:
                  # ✨ 워커를 5로 유지해 API 차단을 줄이고 안정적으로 수집
                  subprocess.run(["python", "collector.py", "--date", d_str, "--skip_dim", "--workers", "5"], check=True)
              except subprocess.CalledProcessError:
                  print(f"❌ 실패: {d_str}")

              current += timedelta(days=1)
              time.sleep(3)

          print(f"✅ {start_str} ~ {end_str} 구간 수집 완료!")
