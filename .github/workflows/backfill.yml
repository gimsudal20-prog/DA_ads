name: 대규모 과거 데이터 백필 (Fast Backfill)

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '수집 시작일 (YYYY-MM-DD)'
        required: true
        default: '2026-01-01'
      end_date:
        description: '수집 종료일 (YYYY-MM-DD)'
        required: true
        default: '2026-03-10'

jobs:
  run-backfill:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 리포지토리 코드 가져오기
        uses: actions/checkout@v3
        
      - name: 2. Python 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 사용하시는 파이썬 버전에 맞게 수정하세요
          
      - name: 3. 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 4. 백필 스크립트 실행
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NAVER_API_KEY: ${{ secrets.NAVER_API_KEY }}
          NAVER_API_SECRET: ${{ secrets.NAVER_API_SECRET }}
        run: |
          python fast_backfill.py --start "${{ github.event.inputs.start_date }}" --end "${{ github.event.inputs.end_date }}"
