name: 대규모 과거 데이터 백필 (Fast Backfill)

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '수집 시작일 (YYYY-MM-DD)'
        required: true
        default: '2026-01-01'
      end_date:
        description: '수집 종료일 (YYYY-MM-DD)'
        required: true
        default: '2026-03-10'

jobs:
  run-backfill:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # ✨ 핵심: 변수명을 올려주신 yml과 완벽하게 동일하게 맞췄습니다!
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests python-dotenv sqlalchemy psycopg2-binary pandas

      - name: Run fast backfill
        run: |
          python fast_backfill.py --start "${{ github.event.inputs.start_date }}" --end "${{ github.event.inputs.end_date }}"
