name: 02_수동 백필
run-name: 02_수동 백필 실행

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '수집 시작일 (YYYY-MM-DD)'
        required: true
        default: '2026-03-11'
      end_date:
        description: '수집 종료일 (YYYY-MM-DD)'
        required: true
        default: '2026-03-18'
      account_name:
        description: '단일 업체명 (예: 휴앤고)'
        required: false
        default: ''
      account_names:
        description: '여러 업체명 콤마구분 (예: 휴앤고,대성소파,로베라)'
        required: false
        default: ''
      workers:
        description: '동시 작업 수 (권장 3)'
        required: false
        default: '3'
      fast:
        description: '빠른 수집 모드'
        required: false
        default: '아니오'
        type: choice
        options:
          - '아니오'
          - '예'
      collect_mode:
        description: '수집 모드'
        required: false
        default: '검색광고 전체+기기'
        type: choice
        options:
          - '검색광고 전체+기기'
          - '검색광고 전체만'
          - '기기만'
      sa_scope:
        description: '검색광고 수집 범위'
        required: false
        default: '전체'
        type: choice
        options:
          - '전체'
          - '소재만'
      run_target:
        description: '실행 대상'
        required: false
        default: '검색광고 전체만'
        type: choice
        options:
          - '검색광고 전체만'
          - '확장소재만'
          - '검색광고 전체+확장소재'
      shop_ext_bucket:
        description: '확장소재 구분'
        required: false
        default: '쇼핑검색(SSA)'
        type: choice
        options:
          - '쇼핑검색(SSA)'
          - '파워링크 외 검색광고'
          - '전체'
      sync_dim_first_day:
        description: '첫날만 구조 수집'
        required: false
        default: '아니오'
        type: choice
        options:
          - '아니오'
          - '예'
      with_gfa:
        description: 'GFA 포함 실행'
        required: false
        default: '아니오'
        type: choice
        options:
          - '아니오'
          - '예'
      shopping_only:
        description: '쇼핑검색(SSA) 캠페인만 재수집'
        required: false
        default: '아니오'
        type: choice
        options:
          - '아니오'
          - '예'
      with_shop_ext:
        description: '확장소재 수집 포함'
        required: false
        default: '아니오'
        type: choice
        options:
          - '아니오'
          - '예'

concurrency:
  group: fast-backfill-${{ github.event.inputs.account_name || github.event.inputs.account_names || 'all' }}-${{ github.event.inputs.start_date }}-${{ github.event.inputs.end_date }}
  cancel-in-progress: false

jobs:
  run-backfill:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
      ACCOUNT_MASTER_FILE: account_master.xlsx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests python-dotenv sqlalchemy psycopg2-binary pandas openpyxl

      - name: Run fast backfill
        run: |
          CMD=(python fast_backfill.py \
            --start "${{ github.event.inputs.start_date }}" \
            --end "${{ github.event.inputs.end_date }}" \
            --workers "${{ github.event.inputs.workers }}" \
            --collect_mode "${{ github.event.inputs.collect_mode }}" \
            --sa_scope "${{ github.event.inputs.sa_scope }}" \
            --run_target "${{ github.event.inputs.run_target }}" \
            --shop_ext_bucket "${{ github.event.inputs.shop_ext_bucket }}")

          if [ -n "${{ github.event.inputs.account_name }}" ]; then
            CMD+=(--account_name "${{ github.event.inputs.account_name }}")
          fi
          if [ -n "${{ github.event.inputs.account_names }}" ]; then
            CMD+=(--account_names "${{ github.event.inputs.account_names }}")
          fi
          if [ "${{ github.event.inputs.fast }}" = "예" ]; then
            CMD+=(--fast)
          fi
          if [ "${{ github.event.inputs.sync_dim_first_day }}" = "예" ]; then
            CMD+=(--sync_dim_first_day)
          fi
          if [ "${{ github.event.inputs.with_gfa }}" = "예" ]; then
            CMD+=(--with_gfa)
          fi
          if [ "${{ github.event.inputs.shopping_only }}" = "예" ]; then
            CMD+=(--shopping_only)
          fi
          if [ "${{ github.event.inputs.with_shop_ext }}" = "예" ]; then
            CMD+=(--with_shop_ext)
          fi

          printf '실행 명령어:'
          printf ' %q' "${CMD[@]}"
          printf '\n'
          "${CMD[@]}"

      - name: Upload split debug rows
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: split-debug-rows-${{ github.run_number }}
          path: debug_split_rows/*.csv
          if-no-files-found: ignore
