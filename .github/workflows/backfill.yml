name: 대규모 과거 데이터 백필 (Fast Backfill)

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '수집 시작일 (YYYY-MM-DD)'
        required: true
        default: '2026-03-11'
      end_date:
        description: '수집 종료일 (YYYY-MM-DD)'
        required: true
        default: '2026-03-18'
      account_name:
        description: '단일 업체명 (예: 휴앤고)'
        required: false
        default: ''
      account_names:
        description: '여러 업체명 콤마구분 (예: 휴앤고,대성소파,로베라)'
        required: false
        default: ''
      workers:
        description: '동시 작업 수 (권장 3)'
        required: false
        default: '3'
      fast:
        description: '빠른 백필 모드: 전 날짜 skip_dim 사용 (true/false)'
        required: false
        default: 'true'
      sync_dim_first_day:
        description: '첫날만 구조수집 수행 (true/false)'
        required: false
        default: 'false'
      with_gfa:
        description: 'GFA 포함 실행 (true/false, 기본 false)'
        required: false
        default: 'false'

concurrency:
  group: fast-backfill-${{ github.event.inputs.account_name || github.event.inputs.account_names || 'all' }}-${{ github.event.inputs.start_date }}-${{ github.event.inputs.end_date }}
  cancel-in-progress: false

jobs:
  run-backfill:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests python-dotenv sqlalchemy psycopg2-binary pandas

      - name: Show selected inputs
        run: |
          echo "start_date=${{ github.event.inputs.start_date }}"
          echo "end_date=${{ github.event.inputs.end_date }}"
          echo "account_name=${{ github.event.inputs.account_name }}"
          echo "account_names=${{ github.event.inputs.account_names }}"
          echo "workers=${{ github.event.inputs.workers }}"
          echo "fast=${{ github.event.inputs.fast }}"
          echo "sync_dim_first_day=${{ github.event.inputs.sync_dim_first_day }}"
          echo "with_gfa=${{ github.event.inputs.with_gfa }}"

      - name: Run fast backfill
        run: |
          CMD="python fast_backfill.py --start '${{ github.event.inputs.start_date }}' --end '${{ github.event.inputs.end_date }}' --workers '${{ github.event.inputs.workers }}'"

          if [ -n "${{ github.event.inputs.account_name }}" ]; then
            CMD="$CMD --account_name '${{ github.event.inputs.account_name }}'"
          fi

          if [ -n "${{ github.event.inputs.account_names }}" ]; then
            CMD="$CMD --account_names '${{ github.event.inputs.account_names }}'"
          fi

          if [ "${{ github.event.inputs.fast }}" = "true" ]; then
            CMD="$CMD --fast"
          fi

          if [ "${{ github.event.inputs.sync_dim_first_day }}" = "true" ]; then
            CMD="$CMD --sync_dim_first_day"
          fi

          if [ "${{ github.event.inputs.with_gfa }}" = "true" ]; then
            CMD="$CMD --with_gfa"
          fi

          echo "실행 명령어: $CMD"
          eval "$CMD"

      - name: Upload split debug rows
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: split-debug-rows-${{ github.run_number }}
          path: debug_split_rows/*.csv
          if-no-files-found: ignore
