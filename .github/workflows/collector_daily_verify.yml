name: collector_daily

on:
  workflow_dispatch:
    inputs:
      collect_mode:
        description: '수집 모드'
        required: false
        default: '검색광고 전체+기기'
        type: choice
        options:
          - '검색광고 전체만'
          - '기기만'
          - '검색광고 전체+기기'
      fast:
        description: '수동 실행 시 빠른 수집 사용 여부'
        required: false
        default: '예'
        type: choice
        options:
          - '예'
          - '아니오'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: collector-daily
      cancel-in-progress: false
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
      ACCOUNT_MASTER_FILE: account_master.xlsx
      DISPATCH_COLLECT_MODE: ${{ github.event.inputs.collect_mode }}
      DISPATCH_FAST: ${{ github.event.inputs.fast }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify collector.py before run
        shell: bash
        run: |
          echo "=== Git info ==="
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          echo "pwd=$(pwd)"
          ls -la
          echo "=== collector.py verify ==="
          test -f collector.py
          grep -n "def normalize_device_name" collector.py || true
          grep -n "source=no_header" collector.py || true
          python - <<'PY'
          from pathlib import Path
          import hashlib
          p = Path('collector.py')
          txt = p.read_text(encoding='utf-8')
          print('collector.py exists:', p.exists())
          print('collector.py size:', len(txt))
          print('normalize_device_name exists:', 'def normalize_device_name' in txt)
          print('no_header debug exists:', 'source=no_header' in txt)
          print('sha256:', hashlib.sha256(txt.encode('utf-8')).hexdigest())
          PY

      - name: Run collector
        shell: bash
        run: |
          echo "⏰ 현재 한국 시간: $(date +%F' '%H:%M:%S)"
          KST_HOUR=$(date +%H)
          YESTERDAY=$(date -d "yesterday" +%F)
          TODAY=$(date +%F)
          COLLECT_MODE="${DISPATCH_COLLECT_MODE:-검색광고 전체+기기}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${DISPATCH_FAST}" = "아니오" ]; then
              FAST_FLAG=""
            else
              FAST_FLAG="--fast"
            fi

            echo "🚀 수동 수집 날짜(전일) = ${YESTERDAY} | 모드=${COLLECT_MODE} | 빠른 수집=${DISPATCH_FAST:-예}"
            python collector.py --date "${YESTERDAY}" --workers 2 --collect_mode "${COLLECT_MODE}" ${FAST_FLAG}
          else
            if [ "$KST_HOUR" = "04" ]; then
              echo "🚀 수집 날짜(전일, 전체 갱신) = ${YESTERDAY} | 모드=${COLLECT_MODE}"
              python collector.py --date "${YESTERDAY}" --workers 2 --collect_mode "${COLLECT_MODE}"
            else
              echo "🚀 수집 날짜(전일, 빠른 갱신) = ${YESTERDAY} | 모드=${COLLECT_MODE}"
              python collector.py --date "${YESTERDAY}" --workers 2 --collect_mode "${COLLECT_MODE}" --fast
            fi

            if [ "${COLLECT_MODE}" = "기기만" ] || [ "${COLLECT_MODE}" = "device_only" ]; then
              echo "⏭️ 당일 빠른 수집은 '기기만' 모드에서 생략합니다."
            else
              echo "🚀 수집 날짜(당일, 빠른 갱신) = ${TODAY} | 모드=${COLLECT_MODE}"
              python collector.py --date "${TODAY}" --workers 2 --collect_mode "${COLLECT_MODE}" --fast
            fi
          fi
