name: collector_daily

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:
    inputs:
      collect_mode:
        description: 'Collect mode'
        required: false
        default: 'sa_with_device'
        type: choice
        options:
          - sa_only
          - device_only
          - sa_with_device
      fast:
        description: 'Use fast mode on manual run'
        required: false
        default: true
        type: boolean

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: collector-daily
      cancel-in-progress: false
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
      ACCOUNT_MASTER_FILE: account_master.xlsx
      DISPATCH_COLLECT_MODE: ${{ github.event.inputs.collect_mode }}
      DISPATCH_FAST: ${{ github.event.inputs.fast }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify collector.py before run
        shell: bash
        run: |
          echo "=== Git info ==="
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          echo "pwd=$(pwd)"
          ls -la
          echo "=== collector.py verify ==="
          test -f collector.py
          grep -n "def normalize_device_name" collector.py || true
          grep -n "source=no_header" collector.py || true
          python - <<'PY'
          from pathlib import Path
          import hashlib
          p = Path('collector.py')
          txt = p.read_text(encoding='utf-8')
          print('collector.py exists:', p.exists())
          print('collector.py size:', len(txt))
          print('normalize_device_name exists:', 'def normalize_device_name' in txt)
          print('no_header debug exists:', 'source=no_header' in txt)
          print('sha256:', hashlib.sha256(txt.encode('utf-8')).hexdigest())
          PY

      - name: Run collector
        shell: bash
        run: |
          echo "⏰ 현재 한국 시간: $(date +%F' '%H:%M:%S)"
          KST_HOUR=$(date +%H)
          YESTERDAY=$(date -d "yesterday" +%F)
          TODAY=$(date +%F)
          COLLECT_MODE="${DISPATCH_COLLECT_MODE:-sa_with_device}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${DISPATCH_FAST}" = "false" ]; then
              FAST_FLAG=""
            else
              FAST_FLAG="--fast"
            fi

            echo "🚀 Manual collect date (Yesterday) = ${YESTERDAY} | mode=${COLLECT_MODE} | fast=${DISPATCH_FAST:-true}"
            python collector.py --date "${YESTERDAY}" --workers 3 --collect_mode "${COLLECT_MODE}" ${FAST_FLAG}
          else
            if [ "$KST_HOUR" = "04" ]; then
              echo "🚀 Collect date (Yesterday, full refresh) = ${YESTERDAY} | mode=${COLLECT_MODE}"
              python collector.py --date "${YESTERDAY}" --workers 3 --collect_mode "${COLLECT_MODE}"
            else
              echo "🚀 Collect date (Yesterday, fast refresh) = ${YESTERDAY} | mode=${COLLECT_MODE}"
              python collector.py --date "${YESTERDAY}" --workers 3 --collect_mode "${COLLECT_MODE}" --fast
            fi

            if [ "${COLLECT_MODE}" = "device_only" ]; then
              echo "⏭️ Today fast refresh는 device_only 모드에서 생략합니다."
            else
              echo "🚀 Collect date (Today, fast refresh) = ${TODAY} | mode=${COLLECT_MODE}"
              python collector.py --date "${TODAY}" --workers 3 --collect_mode "${COLLECT_MODE}" --fast
            fi
          fi
