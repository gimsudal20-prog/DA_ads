name: GFA 성과 데이터 동기화
run-name: GFA 성과 동기화 실행

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  run-gfa-collector:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ACCOUNT_MASTER_FILE: account_master.xlsx

    steps:
      - name: 저장소 코드 불러오기
        uses: actions/checkout@v4

      - name: Python 3.11 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas requests sqlalchemy psycopg2-binary openpyxl python-dotenv

      - name: GFA 전용 수집기 실행
        run: |
          if [ -f collector_gfa.py ]; then
            python collector_gfa.py
          else
            echo "collector_gfa.py 가 현재 업로드된 소스에 없어 GFA 성과 수집은 건너뜁니다."
          fi
