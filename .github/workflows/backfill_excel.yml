name: 📊 엑셀 기반 초고속 백필 (backfill.py)

on:
  workflow_dispatch:

jobs:
  run-excel-backfill:
    runs-on: ubuntu-latest
    
    strategy:
      max-parallel: 6 
      fail-fast: false
      matrix:
        period:
          - {start: "2026-01-01", end: "2026-01-12"}
          - {start: "2026-01-13", end: "2026-01-24"}
          - {start: "2026-01-25", end: "2026-02-05"}
          - {start: "2026-02-06", end: "2026-02-17"}
          - {start: "2026-02-18", end: "2026-02-28"}
          - {start: "2026-03-01", end: "2026-03-10"}

    env:
      TZ: Asia/Seoul
      PYTHONUNBUFFERED: 1
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
      START_DATE: ${{ matrix.period.start }}
      END_DATE: ${{ matrix.period.end }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv sqlalchemy psycopg2-binary pandas openpyxl

      - name: Run backfill.py
        # ✨ 복잡한 스크립트 없이 backfill.py 파일 하나만 호출합니다.
        run: |
          python -u backfill.py --start ${{ env.START_DATE }} --end ${{ env.END_DATE }}
