name: Naver Ads Auto Collector (Hourly Check)

on:
  schedule:
    # 매 정각마다(1시간 단위) 네이버 상태를 감시하여 꺼진 시간을 칼같이 잡아냅니다.
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  run-hourly-check:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Seoul # 한국 시간 기준 설정

    steps:
      - name: 📥 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 🐍 파이썬 환경 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 필요 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary SQLAlchemy pandas requests python-dotenv

      - name: 🚀 캠페인 꺼짐 시간 초경량 스캔 실행
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
          NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
          CUSTOMER_ID: ${{ secrets.CUSTOMER_ID }}
        run: |
          # 무거운 전체 수집기(collector.py) 대신 가벼운 순찰 스크립트 실행
          python check_off.py
