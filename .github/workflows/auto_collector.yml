name: Naver Ads Auto Collector (Hourly Check)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-hourly-check:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      ACCOUNT_MASTER_FILE: account_master.xlsx

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary SQLAlchemy pandas requests python-dotenv openpyxl

      - name: Run OFF Scanner
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
          NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
          CUSTOMER_ID: ${{ secrets.CUSTOMER_ID }}
        run: |
          python check_off.py
