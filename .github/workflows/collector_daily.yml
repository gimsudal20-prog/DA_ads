name: 네이버 광고 성과 일일 수집
run-name: 네이버 광고 일일 수집 실행

on:
  schedule:
    - cron: "7 19,1,7,13 * * *"   # KST 04:07 / 10:07 / 16:07 / 22:07
  workflow_dispatch: {}

concurrency:
  group: collector-daily
  cancel-in-progress: false

jobs:
  run-collector:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
      ACCOUNT_MASTER_FILE: account_master.xlsx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests python-dotenv sqlalchemy psycopg2-binary pandas openpyxl

      - name: Run collector (Yesterday / Today optimized)
        run: |
          echo "⏰ 현재 한국 시간: $(date +%F' '%H:%M:%S)"

          KST_HOUR=$(date +%H)
          YESTERDAY=$(date -d "yesterday" +%F)
          TODAY=$(date +%F)

          if [ "$KST_HOUR" = "04" ]; then
            echo "🚀 Collect date (Yesterday, full refresh) = ${YESTERDAY}"
            python collector.py --date "${YESTERDAY}" --workers 3
          else
            echo "🚀 Collect date (Yesterday, fast refresh) = ${YESTERDAY}"
            python collector.py --date "${YESTERDAY}" --workers 3 --fast
          fi

          echo "🚀 Collect date (Today, fast refresh) = ${TODAY}"
          python collector.py --date "${TODAY}" --workers 3 --fast
