name: Daily Naver Ads Collector

on:
  schedule:
    # UTC 기준 19:07, 01:07, 07:07, 13:07
    # 한국 시간(KST) 기준 04:07, 10:07, 16:07, 22:07
    # 정각(0분)은 GitHub Actions 부하가 몰릴 수 있어 7분으로 분산
    - cron: "7 19,1,7,13 * * *"
  workflow_dispatch: {}

concurrency:
  group: collector-daily
  cancel-in-progress: false

jobs:
  run-collector:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests python-dotenv sqlalchemy psycopg2-binary pandas

      - name: Run collector (Yesterday full / Today stats only)
        run: |
          echo "⏰ 현재 한국 시간: $(date +%F' '%H:%M:%S)"

          YESTERDAY=$(date -d "yesterday" +%F)
          TODAY=$(date +%F)

          echo "🚀 Collect date (Yesterday, full) = ${YESTERDAY}"
          python collector.py --date "${YESTERDAY}"

          echo "🚀 Collect date (Today, stats only) = ${TODAY}"
          python collector.py --date "${TODAY}" --skip_dim
