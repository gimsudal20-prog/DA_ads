name: backfill

on:
  workflow_dispatch:
    inputs:
      start:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        type: string
      end:
        description: 'End date (YYYY-MM-DD)'
        required: true
        type: string
      workers:
        description: 'Workers'
        required: false
        default: '1'
        type: string
      collect_mode:
        description: 'Collect mode'
        required: false
        default: 'sa_with_device'
        type: choice
        options:
          - sa_only
          - device_only
          - sa_with_device
      account_name:
        description: 'Optional single account name'
        required: false
        default: ''
        type: string
      fast:
        description: 'Use fast mode'
        required: false
        default: false
        type: boolean
      sync_dim_first_day:
        description: 'Sync dim on first day'
        required: false
        default: true
        type: boolean
      shopping_only:
        description: 'Shopping only'
        required: false
        default: false
        type: boolean
      with_shop_ext:
        description: 'Include shopping extension collector'
        required: false
        default: false
        type: boolean

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    concurrency:
      group: backfill-manual
      cancel-in-progress: false
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
      ACCOUNT_MASTER_FILE: account_master.xlsx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify collector.py and fast_backfill.py before run
        shell: bash
        run: |
          echo "=== Git info ==="
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          echo "pwd=$(pwd)"
          ls -la
          echo "=== collector.py verify ==="
          test -f collector.py
          grep -n "def normalize_device_name" collector.py || true
          grep -n "source=no_header" collector.py || true
          echo "=== fast_backfill.py verify ==="
          test -f fast_backfill.py
          grep -n "shopping_only" fast_backfill.py || true
          grep -n "with_shop_ext" fast_backfill.py || true
          python - <<'PY'
          from pathlib import Path
          import hashlib
          for name in ('collector.py', 'fast_backfill.py'):
              p = Path(name)
              txt = p.read_text(encoding='utf-8')
              print(f'[{name}] size:', len(txt))
              print(f'[{name}] sha256:', hashlib.sha256(txt.encode('utf-8')).hexdigest())
          PY

      - name: Run backfill
        shell: bash
        run: |
          CMD=(python fast_backfill.py --start "${{ github.event.inputs.start }}" --end "${{ github.event.inputs.end }}" --workers "${{ github.event.inputs.workers }}" --collect_mode "${{ github.event.inputs.collect_mode }}")

          if [ -n "${{ github.event.inputs.account_name }}" ]; then
            CMD+=(--account_name "${{ github.event.inputs.account_name }}")
          fi

          if [ "${{ github.event.inputs.fast }}" = "true" ]; then
            CMD+=(--fast)
          fi

          if [ "${{ github.event.inputs.sync_dim_first_day }}" = "true" ]; then
            CMD+=(--sync_dim_first_day)
          fi

          if [ "${{ github.event.inputs.shopping_only }}" = "true" ]; then
            CMD+=(--shopping_only)
          fi

          if [ "${{ github.event.inputs.with_shop_ext }}" = "true" ]; then
            CMD+=(--with_shop_ext)
          fi

          printf '실행 명령어:'
          printf ' %q' "${CMD[@]}"
          printf '\n'
          "${CMD[@]}"
