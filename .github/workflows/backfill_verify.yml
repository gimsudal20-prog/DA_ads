name: backfill

on:
  workflow_dispatch:
    inputs:
      start:
        description: '시작일 (YYYY-MM-DD)'
        required: true
        type: string
      end:
        description: '종료일 (YYYY-MM-DD)'
        required: true
        type: string
      workers:
        description: '동시 작업 수'
        required: false
        default: '1'
        type: string
      collect_mode:
        description: '수집 모드'
        required: false
        default: '검색광고 전체+기기'
        type: choice
        options:
          - '검색광고 전체만'
          - '기기만'
          - '검색광고 전체+기기'
      sa_scope:
        description: '검색광고 수집 범위'
        required: false
        default: '전체'
        type: choice
        options:
          - '전체'
          - '소재만'
      run_target:
        description: '실행 대상'
        required: false
        default: '검색광고 전체만'
        type: choice
        options:
          - '검색광고 전체만'
          - '확장소재만'
          - '검색광고 전체+확장소재'
      shop_ext_bucket:
        description: '확장소재 구분'
        required: false
        default: '쇼핑검색(SSA)'
        type: choice
        options:
          - '쇼핑검색(SSA)'
          - '파워링크 외 검색광고'
          - '전체'
      account_name:
        description: '단일 업체명 (선택)'
        required: false
        default: ''
        type: string
      fast:
        description: '빠른 수집 모드'
        required: false
        default: '아니오'
        type: choice
        options:
          - '아니오'
          - '예'
      sync_dim_first_day:
        description: '첫날만 구조 수집'
        required: false
        default: '예'
        type: choice
        options:
          - '아니오'
          - '예'
      shopping_only:
        description: '쇼핑검색(SSA) 캠페인만 재수집'
        required: false
        default: '아니오'
        type: choice
        options:
          - '아니오'
          - '예'
      with_shop_ext:
        description: '확장소재 수집 포함'
        required: false
        default: '아니오'
        type: choice
        options:
          - '아니오'
          - '예'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    concurrency:
      group: backfill-manual
      cancel-in-progress: false
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NAVER_ADS_API_KEY: ${{ secrets.NAVER_ADS_API_KEY }}
      NAVER_ADS_SECRET: ${{ secrets.NAVER_ADS_SECRET }}
      ACCOUNT_MASTER_FILE: account_master.xlsx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify collector.py and fast_backfill.py before run
        shell: bash
        run: |
          echo "=== Git info ==="
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          echo "pwd=$(pwd)"
          ls -la
          echo "=== collector.py verify ==="
          test -f collector.py
          grep -n "def normalize_device_name" collector.py || true
          grep -n "source=no_header" collector.py || true
          echo "=== fast_backfill.py verify ==="
          test -f fast_backfill.py
          grep -n "shopping_only" fast_backfill.py || true
          grep -n "with_shop_ext" fast_backfill.py || true
          python - <<'PY'
          from pathlib import Path
          import hashlib
          for name in ('collector.py', 'fast_backfill.py'):
              p = Path(name)
              txt = p.read_text(encoding='utf-8')
              print(f'[{name}] size:', len(txt))
              print(f'[{name}] sha256:', hashlib.sha256(txt.encode('utf-8')).hexdigest())
          PY

      - name: Run backfill
        shell: bash
        run: |
          CMD=(python fast_backfill.py \
            --start "${{ github.event.inputs.start }}" \
            --end "${{ github.event.inputs.end }}" \
            --workers "${{ github.event.inputs.workers }}" \
            --collect_mode "${{ github.event.inputs.collect_mode }}" \
            --sa_scope "${{ github.event.inputs.sa_scope }}" \
            --run_target "${{ github.event.inputs.run_target }}" \
            --shop_ext_bucket "${{ github.event.inputs.shop_ext_bucket }}")

          if [ -n "${{ github.event.inputs.account_name }}" ]; then
            CMD+=(--account_name "${{ github.event.inputs.account_name }}")
          fi
          if [ "${{ github.event.inputs.fast }}" = "예" ]; then
            CMD+=(--fast)
          fi
          if [ "${{ github.event.inputs.sync_dim_first_day }}" = "예" ]; then
            CMD+=(--sync_dim_first_day)
          fi
          if [ "${{ github.event.inputs.shopping_only }}" = "예" ]; then
            CMD+=(--shopping_only)
          fi
          if [ "${{ github.event.inputs.with_shop_ext }}" = "예" ]; then
            CMD+=(--with_shop_ext)
          fi

          printf '실행 명령어:'
          printf ' %q' "${CMD[@]}"
          printf '\n'
          "${CMD[@]}"
